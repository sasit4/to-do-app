<!DOCTYPE html>
<html>

<head>
    <title>To Do App</title>
    <!-- bootstrap -->
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
     <!-- css -->
   <link rel="stylesheet" href="index.css">

</head>

<body>

    <div class="card-box">

        <h2 class="heading text-center">📖 To Do App</h2>

        <div class="month d-flex justify-content-between align-items-center">
            <span onclick="prevmonth()" class="arrow">👈</span>
            <h5 id="monthYear"></h5>
            <span onclick="nextmonth()" class="arrow">👉</span>
        </div>

        <div class="calendar" id="calendar">
        </div>

        <select id="category" class="form-select mt-3">
           
            <option value="">Select Category</option>
            <option>Personal Work</option>
            <option>Study Plan</option>
            <option>Fitness Work</option>
            <option>Trip Planning</option>
            <option>Shopping Grocery</option>
            <option>Meditation Practice</option>

        </select>

        <button class="btn btn-warning w-100 mt-4" onclick="openTask()">Open Task</button>

        <div class="text-end mt-3">
            <button class="btn btn-light btn-sm" onclick="openNotes()">📝 All Tasks</button>
        </div>

    </div>

    <script>
 
        let currentDate = new Date()
        let selectedDate = ""

        function generateCalendar() {

            let cal = document.getElementById("calendar")
            cal.innerHTML = ""

            let year = currentDate.getFullYear()
            let month = currentDate.getMonth()

            document.getElementById("monthYear").innerHTML =
                currentDate.toLocaleString('default', { month: 'long' }) + " " + year

            let days = new Date(year, month + 1, 0).getDate()

            for (let i = 1; i <= days; i++) {

                let div = document.createElement("div")
                div.className = "day"
                div.innerHTML = i

                div.onclick = function () {
                    selectedDate = i + "/" + (month + 1) + "/" + year
                    localStorage.setItem("date", selectedDate)
                    alert("Selected: " + selectedDate)
                }

                cal.appendChild(div)
            }

        }

        function nextmonth() {
            currentDate.setMonth(currentDate.getMonth() + 1)
            generateCalendar()
        }

        function prevmonth() {
            currentDate.setMonth(currentDate.getMonth() - 1)
            generateCalendar()
        }

        function openTask() {

            let cat = document.getElementById("category").value
            if (cat == "") { alert("Select Category"); return }

            localStorage.setItem("category", cat)
            window.location = "task.html"

        }

        function openNotes() {
            window.location = "all_tasks.html"
        }

        generateCalendar()

        

    </script>

</body>

</html>
